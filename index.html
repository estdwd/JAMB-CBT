<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f0e8">
  <title>JAMB Practice CBT • 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <style>
    /* ════════════════════════════════════════════════════════════════
       🖼️  BACKGROUND IMAGE — change ONE line below to update ALL screens
       ════════════════════════════════════════════════════════════════ */
    :root {
      --bg-image: url('Jamb.jpg'); /* ← CHANGE THIS to update background everywhere */
      --accent:        #4da6c8;
      --accent-dark:   #2e8fab;
      --accent-deep:   #1e7a94;
      --accent-rgb:    77,166,200;
      --accent-muted:  rgba(77,166,200,0.12);
      --green:         #3aaa6e;
      --green-dark:    #2d8a58;
      --green-muted:   rgba(58,170,110,0.15);
      --bg-color:      #f5f0e8;
      --bg-overlay:    none;
      --surface:       #ffffff;
      --surface-alt:   #ede8df;
      --border:        #d8d1c4;
      --text:          #1a1a1a;
      --text-muted:    #7a7368;
    }
    /* All screens inherit the background image from body */
    body {
      background-image: var(--bg-image);
      background-color: var(--bg-color);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: system-ui,-apple-system,sans-serif;
      font-weight: 700;
      min-height: 100vh;
      color: var(--text);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.95);
      z-index: -1;
      pointer-events: none;
    }
    /* Make all page containers transparent so body image shows through */
    .cfg-page, .welcome-page, .results-page {
      background: transparent !important;
    }

    /* ══ Login Page Styles ══ */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 36px 40px;
    }
    .login-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    /* ════════════════════════════════════════════════════════════════
       🖼️  CALCULATOR / LOGO IMAGE — edit the login-logo-img CSS below
       The atom ⚛️ icon is currently shown as text. To replace it with
       an actual image, swap the <div class="login-logo-icon"> element
       in the JSX with an <img> tag pointing to your image URL.
       Example: <img src="https://your-calc-image.png" className="login-logo-img" />
       Adjust width/height below as needed:
       ════════════════════════════════════════════════════════════════ */
    .login-logo-img { width: 90px; height: 90px; object-fit: contain; }
    .login-logo-icon {
      width: 90px; height: 90px;
      background: var(--green-muted);
      border-radius: 20px;
      border: 1px solid rgba(58,170,110,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
    }
    .login-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--green-muted);
      border: 1px solid rgba(58,170,110,0.3);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--green-dark);
      text-transform: uppercase;
    }
    .login-title {
      font-size: 28px; font-weight: 800; color: var(--text);
      letter-spacing: -0.5px; margin: 0; line-height: 1.2;
    }
    .login-subtitle {
      font-size: 14px; color: var(--text-muted);
      margin: 4px 0 0; font-weight: 400;
    }
    .login-divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }
    .login-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--text-muted); text-transform: uppercase;
      margin-bottom: 10px; display: block;
    }
    .login-input {
      width: 100%; box-sizing: border-box;
      background: var(--surface-alt);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 16px; color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .login-input:focus {
      border-color: var(--accent);
    }
    .login-input::placeholder { color: var(--text-muted); opacity:0.6; }
    .login-btn {
      width: 100%; margin-top: 24px;
      background: var(--accent);
      border: none; border-radius: 12px;
      padding: 17px;
      font-size: 15px; font-weight: 700; letter-spacing: 0.04em;
      color: #fff; cursor: pointer;
      transition: background .15s;
    }
    .login-btn:active { background: var(--accent-dark); }
    .login-footer {
      margin-top: 24px; text-align: center;
      font-size: 12px; color: var(--text-muted);
    }
    .login-stats {
      display: flex; justify-content: center; gap: 24px;
      margin-top: 28px; padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .login-stat { text-align: center; }
    .login-stat-num { font-size: 20px; font-weight: 800; color: var(--text); }
    .login-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ══ Config Screen ══ */
    .cfg-page { min-height:100vh; padding: 0 0 48px; overflow-y:auto; }
    .cfg-topbar { display:flex; justify-content:space-between; align-items:center; padding:20px 20px 0; max-width:480px; margin:0 auto; }
    .cfg-user-chip { display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--border); border-radius:999px; padding:8px 16px 8px 8px; }
    .cfg-avatar { width:32px; height:32px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; }
    .cfg-username { font-size:14px; font-weight:600; color:var(--text); }
    .cfg-logout-btn { font-size:12px; font-weight:700; color:var(--text-muted); background:#fff; border:1px solid var(--border); border-radius:999px; cursor:pointer; padding:7px 14px; text-decoration:none; }
    .cfg-logout-btn:active { background:var    (--surface-alt); }
    .cfg-body { max-width:480px; margin:0 auto; padding:24px 20px 0; }
    .cfg-heading { font-size:22px; font-weight:800; color:var(--text); margin-bottom:4px; }
    .cfg-subheading { font-size:13px; color:var(--text-muted); margin-bottom:24px; }
    .cfg-section-label { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--green-dark); margin-bottom:10px; display:block; }
    .cfg-avail { font-size:12px; color:var(--text-muted); margin-bottom:24px; }
    .cfg-stepper-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:18px 20px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .cfg-stepper-info { flex:1; }
    .cfg-stepper-title { font-size:13px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; }
    .cfg-stepper-sub { font-size:12px; color:var(--text-muted); margin-top:2px; opacity:0.6; }
    .cfg-stepper-controls { display:flex; align-items:center; gap:4px; }
    .cfg-stepper-val { font-size:26px; font-weight:800; color:var(--text); width:68px; text-align:center; background:transparent; border:none; outline:none; }
    .cfg-stepper-btn { width:40px; height:40px; border-radius:10px; background:var(--surface-alt); border:1px solid var(--border); color:var(--text); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .1s; user-select:none; -webkit-user-select:none; }
    .cfg-stepper-btn:active { background:var(--border); transform:scale(.93); }
    .cfg-error { font-size:12px; color:#c0392b; margin:6px 0 10px; padding:8px 12px; background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.2); border-radius:8px; }
    .cfg-presets { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
    .cfg-preset-btn { flex:1; min-width:56px; padding:8px 4px; border-radius:10px; background:#fff; border:1.5px solid var(--border); color:var(--text-muted); font-size:12px; font-weight:600; cursor:pointer; text-align:center; transition:all .15s; }
    .cfg-preset-btn:active { background:var(--accent-muted); border-color:var(--accent); color:var(--accent-dark); }
    .cfg-start-btn { width:100%; padding:17px; border-radius:12px; margin-top:4px; background:var(--green); border:none; color:#fff; font-size:15px; font-weight:800; letter-spacing:.04em; cursor:pointer; transition:background .15s; }
    .cfg-start-btn:active { background:var(--green-dark); }

    /* ══ Page Tab Switcher ══ */
    .page-tabs { display:flex; background:var(--surface-alt); border:1px solid var(--border); border-radius:12px; padding:4px; gap:4px; margin-bottom:24px; }
    .page-tab { flex:1; padding:10px 8px; border-radius:8px; border:none; font-size:13px; font-weight:700; cursor:pointer; transition:all .18s; background:transparent; color:var(--text-muted); text-align:center; }
    .page-tab.active { background:#fff; color:var(--accent-dark); border:1px solid var(--border); }
    .page-tab .tab-badge { display:inline-block; margin-left:5px; background:rgba(77,166,200,0.15); color:var(--accent-dark); border-radius:999px; font-size:10px; font-weight:800; padding:1px 6px; vertical-align:middle; }
    .page-tab.active .tab-badge { background:var(--accent-muted); }

    /* ══ Topic Selection ══ */
    .topic-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    @media(min-width:480px){ .topic-grid { grid-template-columns:1fr 1fr 1fr; } }
    .topic-card {
      padding:14px 12px; border-radius:12px; text-align:left;
      border:1.5px solid var(--border);
      background:#fff;
      color:var(--text-muted); cursor:pointer;
      transition:all .15s; position:relative; overflow:hidden;
    }
    .topic-card:active { transform:scale(.97); }
    .topic-card.topic-active {
      border-color:var(--green);
      background:var(--green-muted);
      color:var(--text);
    }
    .topic-card.topic-active::after {
      content:'';
      position:absolute; top:8px; right:10px;
      font-size:12px; font-weight:800;
      color:var(--green);
    }
    .topic-icon { font-size:20px; margin-bottom:6px; display:block; }
    .topic-name { font-size:12px; font-weight:700; line-height:1.3; display:block; }
    .topic-count { font-size:11px; color:var(--text-muted); margin-top:3px; display:block; opacity:0.7; }
    .topic-card.topic-active .topic-count { color:var(--green-dark); opacity:1; }
    .topic-select-all-row { display:flex; gap:8px; margin-bottom:14px; }
    .topic-ctrl-btn {
      flex:1; padding:9px 10px; border-radius:10px;
      background:#fff;
      border:1px solid var(--border);
      color:var(--text-muted); font-size:12px; font-weight:700;
      cursor:pointer; text-align:center; transition:all .15s;
    }
    .topic-ctrl-btn:active { background:var(--green-muted); border-color:var(--green); color:var(--green-dark); }
    .topic-selection-summary {
      font-size:12px; color:var(--text-muted);
      margin-bottom:16px; padding:10px 14px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:10px;
    }
    .topic-selection-summary span { color:var(--green-dark); font-weight:700; }
    .topic-next-btn { width:100%; padding:16px; border-radius:12px; background:var(--green); border:none; color:#fff; font-size:15px; font-weight:800; letter-spacing:.04em; cursor:pointer; transition:background .15s; }
    .topic-next-btn:active { background:var(--green-dark); }

    /* ══ Difficulty section ══ */
    .diff-section { margin-top:0; }
    .cfg-diff-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:6px; }
    .cfg-diff-pill { padding:10px 4px; border-radius:10px; text-align:center; font-size:12px; font-weight:700; border:1.5px solid transparent; cursor:pointer; transition:all .15s; background:#fff; color:var(--text-muted); border-color:var(--border); }
    .cfg-diff-pill.active-all   { background:#e8f4fb; border-color:var(--accent); color:var(--accent-dark); }
    .cfg-diff-pill.active-simple{ background:#e8f8ee; border-color:var(--green); color:var(--green-dark); }
    .cfg-diff-pill.active-medium{ background:#fef9e8; border-color:#c8a000; color:#7a6000; }
    .cfg-diff-pill.active-hard  { background:#fceaea; border-color:#c0392b; color:#922b21; }

    /* ══ Welcome Screen ══ */
    .welcome-page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; background:var(--bg-color); }
    .welcome-icon { width:80px; height:80px; border-radius:20px; background:var(--green-muted); border:1px solid rgba(58,170,110,0.3); display:flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:28px; }
    .welcome-kicker { font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--green-dark); margin-bottom:12px; }
    .welcome-title { font-size:32px; font-weight:900; color:var(--text); letter-spacing:-1px; line-height:1.1; margin-bottom:8px; text-align:center; }
    .welcome-sub { font-size:14px; color:var(--text-muted); text-align:center; margin-bottom:48px; }
    .welcome-start-btn { width:100%; max-width:320px; padding:18px; border-radius:12px; background:var(--accent); border:none; color:#fff; font-size:16px; font-weight:800; letter-spacing:.03em; cursor:pointer; transition:background .15s; }
    .welcome-start-btn:active { background:var(--accent-dark); }

    /* ══ Test Screen ══ */
    .test-topbar { position:sticky; top:0; z-index:30; background:var(--bg-color); border-bottom:1px solid var(--border); }
    .test-topbar-inner { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; max-width:600px; margin:0 auto; }
    .test-timer { font-family:monospace; font-size:17px; font-weight:700; color:var(--text); }
    .test-progress-bar { height:3px; background:var(--border); }
    .test-progress-fill { height:100%; background:var(--green); transition:width .3s; }
    .test-body { max-width:600px; margin:0 auto; padding:24px 20px 40px; }
    .test-badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; border:1px solid; text-transform:capitalize; margin-right:6px; }
    .test-q-num { color:var(--accent-dark); font-weight:700; }
    .test-option { width:100%; text-align:left; padding:16px 18px; border-radius:12px; border:1.5px solid var(--border); background:#fff; color:var(--text); display:flex; align-items:center; gap:14px; margin-bottom:10px; cursor:pointer; transition:all .15s; user-select:none; -webkit-user-select:none; }
    .test-option:active { transform:scale(.98); }
    .test-option.selected { border-color:var(--accent); background:rgba(77,166,200,0.08); color:var(--text); }
    .test-opt-letter { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; background:var(--surface-alt); color:var(--text-muted); flex-shrink:0; }
    .test-option.selected .test-opt-letter { background:var(--accent); color:#fff; }
    .test-nav-btn { flex:1; padding:14px; border-radius:12px; font-size:14px; font-weight:700; border:none; cursor:pointer; }
    .test-nav-btn.active { background:var(--surface-alt); color:var(--text); border:1px solid var(--border); }
    .test-nav-btn.disabled { background:var(--surface-alt); color:var(--text-muted); cursor:not-allowed; opacity:0.4; }
    .test-submit-btn { width:100%; padding:16px; border-radius:12px; background:var(--green); border:none; color:#fff; font-size:15px; font-weight:800; cursor:pointer; margin-top:4px; transition:background .15s; }
    .test-submit-btn:active { background:var(--green-dark); }

    /* ══ Modal ══ */
    .flat-modal-overlay { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,0.35); display:flex; align-items:flex-end; justify-content:center; }
    .flat-modal-overlay.center { align-items:center; padding:20px; }
    .flat-modal { background:#fff; border:1px solid var(--border); border-radius:20px 20px 0 0; padding:28px 24px 36px; width:100%; max-width:520px; }
    .flat-modal.rounded { border-radius:20px; }
    .flat-modal-center { background:#fff; border:1px solid var(--border); border-radius:20px; padding:32px 28px; width:100%; max-width:380px; text-align:center; }

    /* ══ Results Screen ══ */
    .results-page { min-height:100vh; overflow-y:auto; padding:32px 20px 60px; background:var(--bg-color); }
    .results-body { max-width:520px; margin:0 auto; }
    .results-score-card { background:#fff; border:1px solid var(--border); border-radius:18px; padding:28px 24px; text-align:center; margin-bottom:16px; }
    .results-pct { font-size:52px; font-weight:900; letter-spacing:-2px; color:var(--green); }
    .results-score { font-size:16px; color:var(--text-muted); margin-top:4px; }
    .results-grade { font-size:18px; font-weight:800; color:var(--text); margin-top:8px; }
    .results-stats { display:flex; gap:0; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
    .results-stat { flex:1; text-align:center; }
    .results-stat-val { font-size:20px; font-weight:800; color:var(--text); }
    .results-stat-lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .results-btn { width:100%; padding:15px; border-radius:12px; font-size:14px; font-weight:700; border:none; cursor:pointer; margin-bottom:10px; transition:background .15s; }
    .results-btn:active { transform:scale(.97); }
    .results-btn.primary { background:var(--accent); color:#fff; }
    .results-btn.primary:active { background:var(--accent-dark); }
    .results-btn.secondary { background:#fff; border:1px solid var(--border); color:var(--text-muted); }
    .results-btn.toggle { background:var(--surface-alt); border:1px solid var(--border); color:var(--text); }
    .review-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; }
    .review-card.correct { border-color:rgba(58,170,110,0.4); }
    .review-card.wrong { border-color:rgba(192,57,43,0.3); }
    .glass{background:#fff;border:1px solid var(--border);}
    .neon-glow{transition:all .2s}
    .green-glow{}
    /* floating emoji animations removed */
    .stepper-btn{width:72px;height:72px;font-size:36px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
    .option-btn{transition:all .2s ease;user-select:none;-webkit-user-select:none}
    .option-btn:active{transform:scale(.97)}
    @keyframes pulse-red{0%,100%{color:#c0392b}50%{color:#e74c3c}}
    .timer-warning{animation:pulse-red 1s ease-in-out infinite}
    @keyframes score-pop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
    .score-pop{animation:score-pop .6s ease-out forwards}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--surface-alt)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    .calc-btn{transition:all .1s ease;user-select:none;-webkit-user-select:none}
    .calc-btn:active{transform:scale(.92)}
    @keyframes calc-slide{0%{transform:translateY(30px) scale(.95);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
    .calc-pop{animation:calc-slide .2s ease-out forwards}
    .deg-active{background:var(--green-muted)!important;border-color:var(--green)!important;}
    .diff-btn{transition:all .15s ease}
    .diff-btn.active{transform:scale(1.05)}
    /* KaTeX color fix */
    .katex{color:inherit}
    .katex .mord,.katex .mbin,.katex .mrel,.katex .mopen,.katex .mclose,.katex .mpunct,.katex .minner,.katex .mop{color:inherit}
    .glass{background:#fff;border:1px solid var(--border);}

    /* ══ Stream Picker Page ══ */
    .stream-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 40px;}
    .stream-topbar{width:100%;max-width:400px;display:flex;justify-content:space-between;align-items:center;padding:20px 0 0;}
    .stream-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:400px;padding:16px 0 0;}
    .stream-kicker{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green-dark);margin-bottom:10px;text-align:center;}
    .stream-heading{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.5px;margin-bottom:6px;text-align:center;}
    .stream-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;text-align:center;}
    .stream-cards{display:flex;flex-direction:column;gap:14px;width:100%;}
    .stream-card{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:20px 18px;cursor:pointer;text-align:left;transition:border-color .2s,transform .15s;width:100%;}
    .stream-card:active{transform:scale(.97);}
    .stream-card.science-card{border-left:4px solid var(--accent);}
    .stream-card.arts-card{border-left:4px solid var(--green);}
    .stream-card-icon{font-size:26px;margin-bottom:6px;display:block;}
    .stream-card-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px;}
    .stream-card-desc{font-size:12px;color:var(--text-muted);line-height:1.5;}
    .stream-card-subjects{font-size:11px;color:var(--text-muted);margin-top:6px;font-style:italic;}

    /* ══ Back button — rounded blue pill with arrow ══ */
    .back-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;transition:background .15s;}
    .back-btn:active{background:var(--accent-dark);}

    /* ══ User name pill — top center ══ */
    .user-pill-center{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:999px;padding:6px 14px 6px 6px;font-size:13px;font-weight:700;color:var(--text);}

    /* ══ Locked subject ══ */
    .topic-card.topic-locked{border-color:var(--accent);background:rgba(77,166,200,0.08);color:var(--text);cursor:default;}
    .topic-locked-badge{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-dark);background:var(--accent-muted);border-radius:999px;padding:2px 7px;display:inline-block;margin-top:4px;}

    /* ══ Slide animations ══ */
    @keyframes slide-out-left{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-100%);opacity:0}}
    @keyframes slide-in-right{0%{transform:translateX(100%);opacity:0}100%{transform:translateX(0);opacity:1}}
    .slide-out-left{animation:slide-out-left .3s ease forwards;}
    .slide-in-right{animation:slide-in-right .3s ease forwards;}

    /* ══ Splash Screen ══ */
    #splash{
      position:fixed;inset:0;z-index:9999;
      background:var(--bg-color);
      background-image:var(--bg-image);
      background-size:cover;background-position:center;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      transition:opacity .6s ease;
    }
    #splash::before{
      content:'';position:absolute;inset:0;
      background:rgba(255,255,255,0.9);
    }
    #splash-inner{
      position:relative;z-index:1;
      display:flex;flex-direction:column;align-items:center;
    }
    /* spinning disk top-left */
    #splash-spinner{
      position:fixed;top:20px;left:20px;
      width:28px;height:28px;
      border:3px solid rgba(77,166,200,0.2);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .8s linear infinite;
      z-index:1;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    /* fade-in for main text block */
    @keyframes fadein{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
    #splash-content{animation:fadein 1s ease .3s both;}
    #splash-brand{
      font-size:20px;font-weight:900;letter-spacing:-1px;
      color:var(--accent-dark);margin-bottom:1px;text-align:center;
    }
    #splash-sub{
      font-size:15px;font-weight:900;color:var(--text-muted);
      letter-spacing:-0.5px;text-transform:uppercase;text-align:center;
    }
    #splash-sub2{
      font-size:50px;font-weight:900;color: var(--green-dark);
      letter-spacing:-0.5px;text-align:center;
    }

    /* ══ Copyright footer — all screens ══ */
    .copyright{
      position:fixed;bottom:8px;left:0;right:0;
      text-align:center;font-size:10px;font-weight:700;
      color:var(--text-muted);opacity:0.5;
      pointer-events:none;z-index:100;letter-spacing:.04em;
    }
    @media(max-height:500px){
      .copyright{display:none;}
    }
  </style>
</head>

/* ═══════════════ UTILITIES ═══════════════ */
function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function formatTime(s){
  const m=Math.floor(s/60),sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function getGrade(pct){
  if(pct>=70)return{grade:'A',label:'Excellent',emoji:'🏆'};
  if(pct>=60)return{grade:'B',label:'Very Good',emoji:'🌟'};
  if(pct>=50)return{grade:'C',label:'Good',emoji:'👍'};
  if(pct>=45)return{grade:'D',label:'Fair',emoji:'📝'};
  return{grade:'F',label:'Needs Improvement',emoji:'📚'};
}

/* ═══════════════ KATEX MATH RENDERER COMPONENT ═══════════════ */
const MathText=({text,className})=>{
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    // Reset to raw text so KaTeX can re-process on text change
    ref.current.innerHTML=text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(window.renderMathInElement){
      try{
        renderMathInElement(ref.current,{
          delimiters:[
            {left:'$$',right:'$$',display:true},
            {left:'$',right:'$',display:false},
            {left:'\\(',right:'\\)',display:false},
            {left:'\\[',right:'\\]',display:true}
          ],
          throwOnError:false,
          trust:true,
          strict:false
        });
      }catch(e){}
    }
  },[text]);
  return <span ref={ref} className={className||''}/>;
};

/* ═══════════════ SCIENTIFIC CALCULATOR ═══════════════ */
const Calculator=({onClose})=>{
  const [display,setDisplay]=useState('0');
  const [expr,setExpr]=useState('');
  const [justEvaled,setJustEvaled]=useState(false);
  const [isDeg,setIsDeg]=useState(true); // degree/radian toggle

  const toRad=(x)=>isDeg?x*Math.PI/180:x;

  const press=(val)=>{
    if(val==='C'){setDisplay('0');setExpr('');setJustEvaled(false);return;}
    if(val==='DEG/RAD'){setIsDeg(d=>!d);return;}
    if(val==='⌫'){
      if(justEvaled){setDisplay('0');setExpr('');setJustEvaled(false);return;}
      const nd=display.length>1?display.slice(0,-1):'0';
      setDisplay(nd);
      setExpr(e=>e.slice(0,-1));
      return;
    }
    if(val==='='){
      try{
        const raw=expr
          .replace(/×/g,'*').replace(/÷/g,'/')
          .replace(/π/g,'Math.PI').replace(/e(?![+\-]?\d)/g,'Math.E')
          .replace(/√\(/g,'Math.sqrt(')
          .replace(/sin\(/g,`(x=>Math.sin(${isDeg?'x*Math.PI/180':'x'}))(`)
          .replace(/cos\(/g,`(x=>Math.cos(${isDeg?'x*Math.PI/180':'x'}))(`)
          .replace(/tan\(/g,`(x=>Math.tan(${isDeg?'x*Math.PI/180':'x'}))(`)
          .replace(/log\(/g,'Math.log10(')
          .replace(/ln\(/g,'Math.log(')
          .replace(/\^/g,'**');
        const result=Function('"use strict";return ('+raw+')')();
        const res=isFinite(result)?parseFloat(result.toFixed(10)).toString():'Error';
        setDisplay(res);setExpr(res);setJustEvaled(true);
      }catch{setDisplay('Error');setExpr('');setJustEvaled(true);}
      return;
    }

    const base=(display==='0'||justEvaled)?'':display;
    const baseExpr=(expr==='0'||justEvaled)?'':expr;

    // Functions that append with open paren
    const funcMap={
      '√':['Math.sqrt(','√('],
      'sin':['sin(','sin('],
      'cos':['cos(','cos('],
      'tan':['tan(','tan('],
      'log':['log(','log('],
      'ln':['ln(','ln('],
    };
    if(funcMap[val]){
      const[e,d]=funcMap[val];
      setExpr(baseExpr+e);setDisplay(base+d);setJustEvaled(false);return;
    }
    if(val==='π'){setExpr(baseExpr+'Math.PI');setDisplay(base+'π');setJustEvaled(false);return;}
    if(val==='e'){setExpr(baseExpr+'Math.E');setDisplay(base+'e');setJustEvaled(false);return;}
    if(val==='x²'){
      const b=base||'0';
      setExpr('('+baseExpr+')**2');setDisplay('('+b+')²');setJustEvaled(true);return;
    }
    if(val==='xⁿ'){setExpr(baseExpr+'^');setDisplay(base+'^');setJustEvaled(false);return;}
    if(val==='1/x'){
      const b=base||'0';
      setExpr('1/('+baseExpr+')');setDisplay('1/('+b+')');setJustEvaled(true);return;
    }
    if(val==='( )'){
      const open=(baseExpr.match(/\(/g)||[]).length;
      const close=(baseExpr.match(/\)/g)||[]).length;
      const bracket=open>close?')':'(';
      setExpr(baseExpr+bracket);setDisplay(base+bracket);setJustEvaled(false);return;
    }
    if(justEvaled&&!['+','-','×','÷','%','^'].includes(val)){
      setDisplay(val);setExpr(val);setJustEvaled(false);return;
    }
    const newExpr=(display==='0'&&!isNaN(val))?val:baseExpr+val;
    const newDisp=(display==='0'&&!isNaN(val))?val:base+val;
    setExpr(newExpr);setDisplay(newDisp);setJustEvaled(false);
  };

  const btnStyle=(v)=>{
    if(v==='=') return 'bg-green-500 text-white font-black text-xl';
    if(['÷','×','-','+'].includes(v)) return 'text-white font-bold text-xl' + ' ' + 'calc-op-btn';
    if(v==='C') return 'bg-red-500 text-white font-bold';
    if(v==='DEG/RAD') return isDeg?'deg-active font-bold text-xs border':'font-bold text-xs border';
    if(['sin','cos','tan','log','ln','√','x²','xⁿ','1/x','π','e','( )','%','⌫'].includes(v))
      return 'calc-fn-btn font-bold text-sm';
    return 'calc-num-btn font-semibold';
  };

  // Layout: scientific top rows + standard bottom
  const rows=[
    ['sin','cos','tan','DEG/RAD'],
    ['log','ln','x²','xⁿ'],
    ['√','1/x','( )','⌫'],
    ['C','π','e','÷'],
    ['7','8','9','×'],
    ['4','5','6','-'],
    ['1','2','3','+'],
    ['0','.','%','='],
  ];

  return(
    <div className="fixed inset-0 z-50 flex items-end justify-center sm:items-center px-3 pb-3 sm:pb-0" onClick={onClose}>
      <div className="calc-pop rounded-3xl p-4 w-full max-w-xs" style={{background:'#fff',border:'1px solid var(--border)',boxShadow:'0 8px 40px rgba(0,0,0,0.12)'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="flex justify-between items-center mb-3">
          <span style={{color:'var(--green-dark)',fontWeight:700,fontSize:'16px'}}>🧮 Scientific Calc</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:'20px',cursor:'pointer'}}>✕</button>
        </div>
        {/* Mode indicator */}
        <div className="flex justify-end mb-2">
          <span style={{fontSize:'11px',padding:'2px 10px',borderRadius:'999px',fontWeight:700,background:isDeg?'var(--green-muted)':'var(--accent-muted)',color:isDeg?'var(--green-dark)':'var(--accent-dark)',border:`1px solid ${isDeg?'var(--green)':'var(--accent)'}`}}>
            {isDeg?'DEG':'RAD'}
          </span>
        </div>
        {/* Display */}
        <div style={{background:'var(--surface-alt)',border:'1px solid var(--border)',borderRadius:'14px',padding:'12px 16px',marginBottom:'12px',textAlign:'right',minHeight:'56px'}}>
          <p style={{color:'var(--text-muted)',fontSize:'12px',margin:'0 0 2px',overflow:'hidden',whiteSpace:'nowrap'}}>{expr||' '}</p>
          <p style={{color:'var(--text)',fontSize:'22px',fontWeight:700,margin:0,overflow:'hidden',whiteSpace:'nowrap'}}>{display}</p>
        </div>
        {/* Buttons */}
        <div className="grid grid-cols-4 gap-1.5">
          {rows.flat().map((v,i)=>(
            <button key={i} onClick={()=>press(v)}
              className={`calc-btn h-12 rounded-xl text-base ${btnStyle(v)} active:scale-90`}
              style={v==='='?{background:'var(--green)',color:'#fff'}:
                     ['÷','×','-','+'].includes(v)?{background:'var(--accent)',color:'#fff'}:
                     v==='C'?{background:'#e74c3c',color:'#fff'}:
                     ['sin','cos','tan','log','ln','√','x²','xⁿ','1/x','π','e','( )','%','⌫'].includes(v)?{background:'var(--accent-muted)',color:'var(--accent-dark)',border:'1px solid rgba(77,166,200,0.2)'}:
                     {background:'var(--surface-alt)',color:'var(--text)',border:'1px solid var(--border)'}}>
              {v}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════ MAIN APP ═══════════════ */
function App(){
  const [screen,setScreen]=useState('welcome');
  const [username,setUsername]=useState('');
  const [password, setPassword] = useState('');
  const [loginError, setLoginError] = useState('');
  const [savedUser,setSavedUser]=useState(localStorage.getItem('jambPracticeUsername')||'');

  // Config
  const [configTab,setConfigTab]=useState('topics');
  const [subjectTab,setSubjectTab]=useState('science');
  const [streamAnim,setStreamAnim]=useState('');
  const [numQStr,setNumQStr]=useState('20');   // raw string for input
  const [durationStr,setDurationStr]=useState('45'); // raw string for input
  const [difficulty,setDifficulty]=useState('all');
  const [selectedTopics,setSelectedTopics]=useState(JAMB_TOPICS.map(t=>t.key));
  const [startErrors,setStartErrors]=useState({});

  // Derived numeric values (NaN if empty/invalid)
  const numQuestions=parseInt(numQStr)||0;
  const duration=parseInt(durationStr)||0;

  // Test
  const [testQuestions,setTestQuestions]=useState([]);
  const [currentQ,setCurrentQ]=useState(0);
  const [answers,setAnswers]=useState({});
  const [endTime,setEndTime]=useState(null);
  const [timeLeft,setTimeLeft]=useState(0);
  const [showGrid,setShowGrid]=useState(false);
  const [showSubmitConfirm,setShowSubmitConfirm]=useState(false);
  const [showCalc,setShowCalc]=useState(false);

  // Results
  const [score,setScore]=useState(0);
  const [timeTaken,setTimeTaken]=useState(0);
  const [showReview,setShowReview]=useState(false);

  const answersRef=useRef({});
  const submittedRef=useRef(false);
  const startTimeRef=useRef(null);
  const testQRef=useRef([]);

  useEffect(()=>{answersRef.current=answers;},[answers]);
  useEffect(()=>{if(savedUser)setScreen('stream');},[]);

  // Filtered pool count
  const filteredPool=useMemo(()=>{
    let pool=QUESTION_BANK;
    // Filter by selected topics
    if(selectedTopics.length>0&&selectedTopics.length<JAMB_TOPICS.length){
      pool=pool.filter(q=>selectedTopics.includes(q.topic));
    }
    // Filter by difficulty
    if(difficulty!=='all')pool=pool.filter(q=>q.difficulty===difficulty);
    return pool;
  },[selectedTopics,difficulty]);

  // Per-topic question counts (for display)
  const topicCounts=useMemo(()=>{
    const counts={};
    JAMB_TOPICS.forEach(t=>{counts[t.key]=QUESTION_BANK.filter(q=>q.topic===t.key).length;});
    return counts;
  },[]);

  const toggleTopic=(key)=>{
    if(key==='english')return; // always locked
    setSelectedTopics(prev=>{
      if(prev.includes(key)){
        // always keep at least English + 1 other
        const without=prev.filter(k=>k!==key);
        return without.filter(k=>k!=='english').length>=1?without:prev;
      }
      // cap: English + max 3 others = 4 total
      const othersCount=prev.filter(k=>k!=='english').length;
      if(othersCount>=3)return prev;
      return [...prev,key];
    });
  };

  // Timer
  useEffect(()=>{
    if(screen!=='test'||!endTime||submittedRef.current)return;
    const tick=()=>{
      const rem=Math.max(0,Math.floor((endTime-Date.now())/1000));
      setTimeLeft(rem);
      if(rem<=0&&!submittedRef.current)doSubmit();
    };
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[screen,endTime]);

  const maxQ=filteredPool.length;
  const qValid=numQuestions>=5&&numQuestions<=maxQ;
  const tValid=duration>=1&&duration<=120;

  // Handlers
  const handleLogin = (e) => {
    if (e && e.preventDefault) e.preventDefault();
    if (!username.trim()) {
      setLoginError('Please enter your name');
      return;
    }
    if (password !== 'eddyrus1234') {
      setLoginError('Incorrect password');
      return;
    }
    setLoginError('');
    const u = username.trim();
    localStorage.setItem('jambPracticeUsername', u);
    setSavedUser(u);
    setConfigTab('topics');
    setScreen('stream');
  };
  const logout=()=>{
    localStorage.removeItem('jambPracticeUsername');
    setSavedUser('');
    setUsername('');
    setPassword('');
    setScreen('welcome');
  };
  const startTest=()=>{
    const errs={};
    if(!numQStr.trim()||isNaN(parseInt(numQStr)))errs.q='Please enter a number of questions.';
    else if(numQuestions<5)errs.q=`Minimum is 5 questions.`;
    else if(numQuestions>maxQ)errs.q=`Max available is ${maxQ} questions.`;
    if(!durationStr.trim()||isNaN(parseInt(durationStr)))errs.t='Please enter a time duration.';
    else if(duration<1)errs.t='Minimum is 1 minute.';
    else if(duration>120)errs.t='Maximum is 120 minutes.';
    if(Object.keys(errs).length){setStartErrors(errs);return;}
    setStartErrors({});
    const pool=filteredPool;
    const cnt=Math.min(numQuestions,pool.length);
    const qs=shuffleArray(pool).slice(0,cnt);
    setTestQuestions(qs);testQRef.current=qs;
    setCurrentQ(0);setAnswers({});answersRef.current={};
    submittedRef.current=false;
    const now=Date.now();startTimeRef.current=now;
    setEndTime(now+duration*60*1000);setTimeLeft(duration*60);
    setShowGrid(false);setShowSubmitConfirm(false);setShowReview(false);
    setScreen('test');
  };
  const blockKeys=e=>{if(['e','E','.','-','+'].includes(e.key))e.preventDefault();};
  const selectAnswer=(qi,oi)=>setAnswers(p=>({...p,[qi]:oi}));
  const doSubmit=()=>{
    if(submittedRef.current)return;
    submittedRef.current=true;
    const a=answersRef.current,qs=testQRef.current;
    let c=0;qs.forEach((q,i)=>{if(a[i]===q.correct)c++;});
    setScore(c);
    setTimeTaken(Math.floor((Date.now()-startTimeRef.current)/1000));
    setScreen('results');
  };

  /* ═════════════ SCREENS ═════════════ */

  // ── WELCOME ──
  if(screen==='welcome')return(
    <div className="welcome-page">
      <div className="welcome-icon">📝</div>
      <p className="welcome-kicker">JAMB Practice</p>
      <h1 className="welcome-title">JAMB CBT<br/>Practice 2026</h1>
      <p className="welcome-sub">Study · Prepare & Excel</p>
      <button onClick={()=>setScreen('login')} className="welcome-start-btn">
        Start Practice
      </button>
    </div>
  );

  // ── LOGIN ──
  if(screen==='login')return(
    <div className="login-page">
      <div className="login-card">
        <div style={{marginBottom:'16px'}}>
          <button className="back-btn" onClick={()=>setScreen('welcome')}>←</button>
        </div>
        <div className="login-logo-wrap">
          <div className="login-logo-icon">📝</div>
        </div>

        {/* Header */}
        <div className="text-center mb-2">
          <span className="login-badge">JAMB ·  Practice</span>
        </div>
        <div className="text-center mt-3">
          <h1 className="login-title">JAMB CBT Practice</h1>
          <p className="login-subtitle">JAMB · 2026 Preparation</p>
        </div>

        <div className="login-divider"></div>

        {/* Input */}
        <label className="login-label">Your name</label>
        <input
          type="text"
          value={username}
          onChange={e=>setUsername(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter')handleLogin(e);}}
          placeholder="e.g. estdwd david"
          autoComplete="username"
          className="login-input"
        />
        <label className="login-label">Password</label>
        <input
          type="password"
          value={password}
          onChange={e => setPassword(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') handleLogin(e); }}
          placeholder="Enter password"
          className="login-input"
        />
      {loginError && (
        <p style={{ 
          color: '#c0392b', 
          fontSize: '12px', 
          marginTop: '12px',
          textAlign: 'center',
          background: 'rgba(192,57,43,0.08)',
          padding: '8px',
          borderRadius: '8px'
        }}>
          {loginError}
        </p>
      )}
        <button onClick={handleLogin} className="login-btn">
          Start Practice
        </button>

        
        {/*<div className="login-stats">
          <div className="login-stat">
            <div className="login-stat-num"></div>
            <div className="login-stat-label">Questions</div>
          </div>
          <div className="login-stat">
            <div className="login-stat-num">6</div>
            <div className="login-stat-label">Topics</div>
          </div>
          <div className="login-stat">
            <div className="login-stat-num">3</div>
            <div className="login-stat-label">Levels</div>
          </div>
        </div>*/}

        <p className="login-footer">Progress is saved on this device</p>
      </div>
    </div>
  );

  // ── STREAM PICKER ──
  if(screen==='stream')return(
    <div className={`stream-page ${streamAnim}`}>
      <div className="stream-topbar">
        <div className="user-pill-center">
          <div className="cfg-avatar">{savedUser.charAt(0).toUpperCase()}</div>
          <span>{savedUser}</span>
        </div>
        <button onClick={logout} className="cfg-logout-btn">Log out</button>
      </div>
      <div className="stream-center">
        <p className="stream-kicker">JAMB Practice 2026</p>
        <h1 className="stream-heading">Choose your stream</h1>
        <p className="stream-sub">Select the group that matches your course combination</p>
        <div className="stream-cards">
          <button className="stream-card science-card" onClick={()=>{
            setSubjectTab('science');
            setStreamAnim('slide-out-left');
            setTimeout(()=>{
              setStreamAnim('');
              setSelectedTopics(['english','mathematics','physics','chemistry','biology']);
              setConfigTab('topics');setScreen('config');
            },300);
          }}>
            <span className="stream-card-icon">🔬</span>
            <div className="stream-card-title">Science</div>
            <div className="stream-card-desc">Medicine, Engineering, Pharmacy, Computer Science and other science-based courses.</div>
            <div className="stream-card-subjects">English · Physics · Chemistry · Biology · Mathematics · Geography</div>
          </button>
          <button className="stream-card arts-card" onClick={()=>{
            setSubjectTab('arts');
            setStreamAnim('slide-out-left');
            setTimeout(()=>{
              setStreamAnim('');
              setSelectedTopics(['english','economics','government','literature']);
              setConfigTab('topics');setScreen('config');
            },300);
          }}>
            <span className="stream-card-icon">🎭</span>
            <div className="stream-card-title">Arts & Commerce</div>
            <div className="stream-card-desc">Law, Accounting, Economics, Social Sciences, Languages and Humanities.</div>
            <div className="stream-card-subjects">English · Economics · Government · Literature · Commerce · Accounting · CRK · IRK · History</div>
          </button>
        </div>
      </div>
    </div>
  );

  // ── CONFIG ──
  if(screen==='config'){
    const SCIENCE_KEYS=['mathematics','geography','physics','chemistry','biology'];
    const ARTS_KEYS=['economics','government','literature','commerce','accounting','crk','irk','history'];
    const streamKeys=subjectTab==='science'?SCIENCE_KEYS:ARTS_KEYS;
    const nonEnglishTopics=JAMB_TOPICS.filter(t=>streamKeys.includes(t.key));
    const nonEnglishSelected=selectedTopics.filter(k=>k!=='english');
    const englishTopic=JAMB_TOPICS.find(t=>t.key==='english');

    const TopBar=()=>(
      <>
        <div className="cfg-topbar">
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <button className="back-btn" onClick={()=>setScreen('stream')}>←</button>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'13px',fontWeight:700,color:'var(--text)'}}>{savedUser}</div>
              <div style={{fontSize:'11px',color:'var(--text-muted)'}}>{subjectTab==='science'?'Science':'Arts & Commerce'}</div>
            </div>
          </div>
          <button onClick={logout} className="cfg-logout-btn">Log out</button>
        </div>
        <div className="cfg-body" style={{paddingBottom:0}}>
          <h1 className="cfg-heading">Set up your test</h1>
          <p className="cfg-subheading">English + 3 subjects · {nonEnglishSelected.length}/3 chosen</p>
          <div className="page-tabs">
            <button className={`page-tab${configTab==='topics'?' active':''}`} onClick={()=>setConfigTab('topics')}>
              Subjects <span className="tab-badge">{selectedTopics.length}/4</span>
            </button>
            <button className={`page-tab${configTab==='settings'?' active':''}`} onClick={()=>setConfigTab('settings')}>
              ⚙️ Settings
            </button>
          </div>
        </div>
      </>
    );

    // ── TOPICS TAB ──
    if(configTab==='topics') return(
      <div className="cfg-page">
        <TopBar/>
        <div className="cfg-body">
          <div className="topic-select-all-row">
            <button className="topic-ctrl-btn" onClick={()=>{
              const top3=nonEnglishTopics.slice(0,3).map(t=>t.key);
              setSelectedTopics(['english',...top3]);
            }}>Select All</button>
            <button className="topic-ctrl-btn" onClick={()=>setSelectedTopics(['english'])}>Clear</button>
          </div>
          <div className="topic-grid">
            {/* English — always locked on */}
            <button className="topic-card topic-locked" disabled>
              <span className="topic-icon">{englishTopic.icon}</span>
              <span className="topic-name">{englishTopic.label}</span>
              <span className="topic-locked-badge">Always on</span>
            </button>
            {/* Other subjects */}
            {nonEnglishTopics.map(t=>{
              const active=selectedTopics.includes(t.key);
              const count=topicCounts[t.key]||0;
              const atCap=nonEnglishSelected.length>=3&&!active;
              return(
                <button key={t.key}
                  className={`topic-card${active?' topic-active':''}${atCap?' opacity-40':''}`}
                  onClick={()=>toggleTopic(t.key)}
                  style={atCap?{opacity:.4,cursor:'not-allowed'}:{}}>
                  <span className="topic-icon">{t.icon}</span>
                  <span className="topic-name">{t.label}</span>
                  <span className="topic-count">{count} questions</span>
                </button>
              );
            })}
          </div>
          <div className="topic-selection-summary">
            English locked · <span>{nonEnglishSelected.length}</span>/3 additional subjects ·{' '}
            <span>{filteredPool.length}</span> questions available
          </div>
          <button className="topic-next-btn" onClick={()=>setConfigTab('settings')}>
            Next: Settings
          </button>
        </div>
      </div>
    );

    // ── SETTINGS TAB ──
    return(
      <div className="cfg-page">
        <TopBar/>
        <div className="cfg-body">
          <button className="back-btn" style={{marginBottom:'16px'}} onClick={()=>setConfigTab('topics')}>←</button>

          {/* Questions */}
          <span className="cfg-section-label">Number of Questions</span>
          <div className="cfg-stepper-card">
            <div className="cfg-stepper-info">
              <div className="cfg-stepper-title">Questions</div>
              <div className="cfg-stepper-sub">Min 5 · Max {maxQ}</div>
            </div>
            <div className="cfg-stepper-controls">
              <button className="cfg-stepper-btn" onClick={()=>{const v=Math.max(5,(parseInt(numQStr)||0)-1);setNumQStr(String(v));setStartErrors(p=>({...p,q:undefined}));}}>−</button>
              <input type="number" value={numQStr}
                onChange={e=>{setNumQStr(e.target.value);setStartErrors(p=>({...p,q:undefined}));}}
                onKeyDown={blockKeys}
                className="cfg-stepper-val"
                placeholder="—"/>
              <button className="cfg-stepper-btn" onClick={()=>{const v=Math.min(maxQ,(parseInt(numQStr)||0)+1);setNumQStr(String(v));setStartErrors(p=>({...p,q:undefined}));}}>+</button>
            </div>
          </div>
          {startErrors.q&&<p className="cfg-error"> {startErrors.q}</p>}
          <div className="cfg-presets">
            {[10,20,30,40,50].filter(n=>n<=maxQ).map(n=>(
              <button key={n} className="cfg-preset-btn" onClick={()=>{setNumQStr(String(n));setStartErrors(p=>({...p,q:undefined}));}}>{n} Qs</button>
            ))}
          </div>

          {/* Duration */}
          <span className="cfg-section-label">Time Limit</span>
          <div className="cfg-stepper-card">
            <div className="cfg-stepper-info">
              <div className="cfg-stepper-title">Duration</div>
              <div className="cfg-stepper-sub">{(parseInt(durationStr)||0)>=60?`${Math.floor((parseInt(durationStr)||0)/60)}h ${(parseInt(durationStr)||0)%60>0?`${(parseInt(durationStr)||0)%60}m`:''} · `:''}Max 120 min</div>
            </div>
            <div className="cfg-stepper-controls">
              <button className="cfg-stepper-btn" onClick={()=>{const v=Math.max(1,(parseInt(durationStr)||0)-1);setDurationStr(String(v));setStartErrors(p=>({...p,t:undefined}));}}>−</button>
              <input type="number" value={durationStr}
                onChange={e=>{setDurationStr(e.target.value);setStartErrors(p=>({...p,t:undefined}));}}
                onKeyDown={blockKeys}
                className="cfg-stepper-val"
                placeholder="—"/>
              <button className="cfg-stepper-btn" onClick={()=>{const v=Math.min(120,(parseInt(durationStr)||0)+1);setDurationStr(String(v));setStartErrors(p=>({...p,t:undefined}));}}>+</button>
            </div>
          </div>
          {startErrors.t&&<p className="cfg-error"> {startErrors.t}</p>}
          <div className="cfg-presets">
            {[15,30,45,60,90].map(n=>(
              <button key={n} className="cfg-preset-btn" onClick={()=>{setDurationStr(String(n));setStartErrors(p=>({...p,t:undefined}));}}>{n} min</button>
            ))}
          </div>

          <button onClick={startTest} className="cfg-start-btn">Start Test</button>
        </div>
      </div>
    );
  }

  // ── TEST ──
  if(screen==='test'){
    if(!testQuestions.length)return null;
    const q=testQuestions[currentQ];
    const answered=Object.keys(answers).length;
    const low=timeLeft<=60,warn=timeLeft<=300&&timeLeft>60;
    const diffBadge=q.difficulty;

    return(
      <div className="min-h-screen flex flex-col">
        {/* Top Bar */}
        <div className="test-topbar">
          <div className="test-topbar-inner">
            <span className={`test-timer ${low?'timer-warning':warn?'':'text-inherit'}`} style={{color:low?undefined:warn?'#c8a000':undefined}}>{formatTime(timeLeft)}</span>
            <span style={{fontSize:'13px',color:'var(--text-muted)',fontWeight:600}}>Q {currentQ+1} / {testQuestions.length}</span>
            <div style={{display:'flex',gap:'16px',alignItems:'center'}}>
              <button onClick={()=>setShowGrid(true)} style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:'18px',cursor:'pointer',padding:'4px'}} aria-label="Navigator">☰</button>
              <button onClick={()=>setShowCalc(c=>!c)} style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:'20px',cursor:'pointer',padding:'4px'}} aria-label="Calculator">🧮</button>
            </div>
          </div>
          <div className="test-progress-bar"><div className="test-progress-fill" style={{width:`${(answered/testQuestions.length)*100}%`}}/></div>
        </div>

        {/* Question */}
        <div style={{flex:1,overflowY:'auto'}}>
          <div className="test-body">
            <div style={{marginBottom:'14px',display:'flex',gap:'6px',flexWrap:'wrap'}}>
              <span className="test-badge" style={{background:diffBadge==='simple'?'rgba(58,170,110,0.12)':diffBadge==='medium'?'rgba(200,160,0,0.12)':'rgba(192,57,43,0.1)',color:diffBadge==='simple'?'var(--green-dark)':diffBadge==='medium'?'#7a6000':'#922b21',borderColor:diffBadge==='simple'?'rgba(58,170,110,0.3)':diffBadge==='medium'?'rgba(200,160,0,0.3)':'rgba(192,57,43,0.25)'}}>{diffBadge}</span>
              {q.topic&&<span className="test-badge" style={{background:'var(--accent-muted)',color:'var(--accent-dark)',borderColor:'rgba(77,166,200,0.25)'}}>{q.topic}</span>}
            </div>

            <p style={{fontSize:'17px',fontWeight:500,color:'var(--text)',lineHeight:1.6,marginBottom:'24px'}}>
              <span className="test-q-num">{currentQ+1}.&nbsp;</span>
              <MathText text={q.question}/>
            </p>

            <div style={{marginBottom:'24px'}}>
              {q.options.map((opt,i)=>{
                const letter=['A','B','C','D'][i];
                const sel=answers[currentQ]===i;
                return(
                  <button key={i} onClick={()=>selectAnswer(currentQ,i)}
                    className={`test-option${sel?' selected':''}`}>
                    <span className="test-opt-letter">{letter}</span>
                    <MathText text={opt} className=""/>
                  </button>
                );
              })}
            </div>

            <div style={{display:'flex',gap:'10px',marginBottom:'12px'}}>
              <button disabled={currentQ===0} onClick={()=>setCurrentQ(p=>p-1)}
                className={`test-nav-btn ${currentQ===0?'disabled':'active'}`}>← Prev</button>
              <button disabled={currentQ===testQuestions.length-1} onClick={()=>setCurrentQ(p=>p+1)}
                className={`test-nav-btn ${currentQ===testQuestions.length-1?'disabled':'active'}`}>Next →</button>
            </div>

            <button onClick={()=>setShowSubmitConfirm(true)} className="test-submit-btn">
              Submit Test ({answered}/{testQuestions.length})
            </button>
          </div>
        </div>

        {/* Grid Modal */}
        {showGrid&&(
          <div className="flat-modal-overlay" onClick={()=>setShowGrid(false)}>
            <div className="flat-modal" style={{maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
                <span style={{fontSize:'16px',fontWeight:700,color:'var(--text)'}}>Question Navigator</span>
                <button onClick={()=>setShowGrid(false)} style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:'20px',cursor:'pointer'}}>✕</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'8px',marginBottom:'16px'}}>
                {testQuestions.map((_,i)=>{
                  const done=answers[i]!==undefined,cur=i===currentQ;
                  return(
                    <button key={i} onClick={()=>{setCurrentQ(i);setShowGrid(false);}}
                      style={{aspectRatio:'1',borderRadius:'10px',border:'1px solid var(--border)',fontWeight:700,fontSize:'14px',cursor:'pointer',
                        background:cur?'var(--accent)':done?'var(--green)':'var(--surface-alt)',
                        color:cur||done?'#fff':'var(--text-muted)'}}>
                      {i+1}
                    </button>
                  );
                })}
              </div>
              <div style={{display:'flex',gap:'16px',fontSize:'12px',color:'var(--text-muted)',justifyContent:'center',marginBottom:'10px'}}>
                <span style={{display:'flex',alignItems:'center',gap:'6px'}}><span style={{width:'10px',height:'10px',borderRadius:'3px',background:'var(--green)',display:'inline-block'}}/>Answered</span>
                <span style={{display:'flex',alignItems:'center',gap:'6px'}}><span style={{width:'10px',height:'10px',borderRadius:'3px',background:'var(--surface-alt)',border:'1px solid var(--border)',display:'inline-block'}}/>Unanswered</span>
                <span style={{display:'flex',alignItems:'center',gap:'6px'}}><span style={{width:'10px',height:'10px',borderRadius:'3px',background:'var(--accent)',display:'inline-block'}}/>Current</span>
              </div>
              <p style={{textAlign:'center',fontSize:'13px',color:'var(--text-muted)'}}>{answered} of {testQuestions.length} answered</p>
            </div>
          </div>
        )}

        {/* Calculator Modal */}
        {showCalc&&<Calculator onClose={()=>setShowCalc(false)}/>}

        {/* Submit Confirm */}
        {showSubmitConfirm&&(
          <div className="flat-modal-overlay center" onClick={()=>setShowSubmitConfirm(false)}>
            <div className="flat-modal-center" onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:'13px',fontWeight:700,letterSpacing:'.08em',color:'var(--text-muted)',textTransform:'uppercase',marginBottom:'14px'}}>Confirm Submit</div>
              <p style={{fontSize:'18px',fontWeight:800,color:'var(--text)',marginBottom:'8px'}}>Submit your test?</p>
              <p style={{fontSize:'14px',color:'var(--text-muted)',marginBottom:'6px'}}>{answered} of {testQuestions.length} answered</p>
              {answered<testQuestions.length&&<p style={{fontSize:'13px',color:'#b8860b',marginBottom:'20px'}}>{testQuestions.length-answered} question{testQuestions.length-answered>1?'s':''} left unanswered</p>}
              <div style={{display:'flex',flexDirection:'column',gap:'10px',marginTop:'20px'}}>
                <button onClick={()=>{setShowSubmitConfirm(false);doSubmit();}}
                  style={{padding:'15px',borderRadius:'12px',border:'none',background:'var(--green)',color:'#fff',fontSize:'14px',fontWeight:800,cursor:'pointer'}}>
                  Yes, Submit
                </button>
                <button onClick={()=>setShowSubmitConfirm(false)}
                  style={{padding:'15px',borderRadius:'12px',border:'1px solid var(--border)',background:'var(--surface-alt)',color:'var(--text-muted)',fontSize:'14px',fontWeight:700,cursor:'pointer'}}>
                  Go Back
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── RESULTS ──
  if(screen==='results'){
    const pct=testQuestions.length?Math.round((score/testQuestions.length)*100):0;
    const{grade,label,emoji}=getGrade(pct);
    const answered=Object.keys(answers).length;

    return(
      <div className="results-page">
        <div className="results-body">

          <div className="results-score-card score-pop">
            <div style={{fontSize:'44px',marginBottom:'8px'}}>{emoji}</div>
            <div className="results-pct">{pct}%</div>
            <div className="results-score">{score} / {testQuestions.length} correct</div>
            <div className="results-grade">Grade {grade} — {label}</div>
            <div className="results-stats">
              <div className="results-stat">
                <div className="results-stat-val">{formatTime(timeTaken)}</div>
                <div className="results-stat-lbl">Time taken</div>
              </div>
              <div className="results-stat">
                <div className="results-stat-val">{answered}</div>
                <div className="results-stat-lbl">Attempted</div>
              </div>
              <div className="results-stat">
                <div className="results-stat-val" style={{color:'var(--green)'}}>{score}</div>
                <div className="results-stat-lbl">Correct</div>
              </div>
              <div className="results-stat">
                <div className="results-stat-val" style={{color:'#c0392b'}}>{answered-score}</div>
                <div className="results-stat-lbl">Wrong</div>
              </div>
            </div>
          </div>

          <button onClick={()=>setShowReview(r=>!r)} className="results-btn toggle">
            {showReview?'▲ Hide Review':'▼ Review Answers'}
          </button>
          <button onClick={()=>{setConfigTab('topics');setScreen('config');}} className="results-btn primary">
            Take Another Test
          </button>
          <button onClick={()=>setScreen('stream')} className="results-btn secondary">
            Change Stream
          </button>
          <button onClick={logout} className="results-btn secondary">
            Log out
          </button>

          {showReview&&(
            <div style={{paddingBottom:'40px'}}>
              {testQuestions.map((q,i)=>{
                const ua=answers[i],correct=ua===q.correct,unanswered=ua===undefined;
                const diffBadge=q.difficulty;
                const dc=diffBadge==='simple'?'var(--green-dark)':diffBadge==='medium'?'#7a6000':'#922b21';
                return(
                  <div key={i} className={`review-card ${correct?'correct':'wrong'}`}>
                    <div style={{display:'flex',alignItems:'flex-start',gap:'10px',marginBottom:'6px'}}>
                      <span style={{fontSize:'16px',flexShrink:0,marginTop:'1px'}}>{correct?'✅':unanswered?'⬜':'❌'}</span>
                      <p style={{fontSize:'14px',color:'var(--text)',fontWeight:500,lineHeight:1.5,margin:0}}>{i+1}. <MathText text={q.question}/></p>
                    </div>
                    <p style={{fontSize:'11px',color:dc,marginLeft:'26px',marginBottom:'6px',textTransform:'capitalize'}}>{diffBadge} · {q.topic}</p>
                    {!unanswered&&!correct&&(
                      <p style={{fontSize:'13px',color:'#c0392b',marginLeft:'26px',marginBottom:'4px'}}>Your answer: {['A','B','C','D'][ua]} — <MathText text={q.options[ua]}/></p>
                    )}
                    {unanswered&&<p style={{fontSize:'13px',color:'#b8860b',marginLeft:'26px',marginBottom:'4px'}}>Not answered</p>}
                    <p style={{fontSize:'13px',color:'var(--green-dark)',marginLeft:'26px'}}>Correct: {['A','B','C','D'][q.correct]} — <MathText text={q.options[q.correct]}/></p>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
// Hide splash after React mounts
const splash=document.getElementById('splash');
if(splash){setTimeout(()=>{splash.style.opacity='0';setTimeout(()=>splash.style.display='none',650);},5000);}
</script>
</body>
</html>
